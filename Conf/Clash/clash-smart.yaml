# ========================= 基本锚点 =========================
# # 远程订阅
# ## 说明: 节点质量 ———— 优质 > 常规 > 备用 > 临时
# ## 注意: 如果没有多个订阅, 请删除对应行以及用到该锚点的地方, 推荐使用substore管理订阅
BaseProxyProvider: &base_PP {type: http, interval: 86400, health-check: {enable: true, lazy: true, interval: 300, url: http://www.gstatic.com/generate_204}}
proxy-providers:
  优质订阅: &myPri {<<: *base_PP, override: {additional-prefix: "[优]"}, url: 填入优质订阅地址}
  常规订阅: &myPub {<<: *base_PP, override: {additional-prefix: "[常]"}, url: 填入常规订阅地址}
  备用订阅: &myBak {<<: *base_PP, override: {additional-prefix: "[备]"}, url: 填入备用订阅地址}
  临时订阅: &myTmp {<<: *base_PP, override: {additional-prefix: "[临]"}, url: 填入临时订阅地址}

# # 基本策略组
# ## 基础类型
BaseProxyGroup: &base_PG {lazy: true}
BasePGDirect: &bpg_direct {<<: *base_PG, type: select, hidden: true, proxies: [DIRECT]}
BasePGReject: &bpg_reject {<<: *base_PG, type: select, hidden: true, proxies: [REJECT]}
BasePGDrop: &bpg_drop {<<: *base_PG, type: select, hidden: true, proxies: [REJECT-DROP]}
# ## 策略类型
ProxyGroupSE: &pg_se {<<: *base_PG, type: select, url: http://www.gstatic.com/generate_204}
ProxyGroupSE_Hide: &pg_se_h {<<: *base_PG, type: select, hidden: true, url: http://www.gstatic.com/generate_204}

ProxyGroupUT: &pg_ut {<<: *base_PG, type: url-test, url: http://www.gstatic.com/generate_204}
ProxyGroupUT_Hide: &pg_ut_h {<<: *base_PG, type: url-test, hidden: true, url: http://www.gstatic.com/generate_204}

ProxyGroupFB: &pg_fb {<<: *base_PG, type: fallback, url: http://www.gstatic.com/generate_204}
ProxyGroupFB_Hide: &pg_fb_h {<<: *base_PG, type: fallback, hidden: true, url: http://www.gstatic.com/generate_204}

ProxyGroupSM: &pg_sm {<<: *base_PG, type: smart, uselightgbm: true, url: http://www.gstatic.com/generate_204}
ProxyGroupSM_Hide: &pg_sm_h {<<: *base_PG, type: smart, hidden: true, uselightgbm: true, url: http://www.gstatic.com/generate_204}

ProxyGroupLB_RR: &pg_lb_rr {<<: *base_PG, type: load-balance, strategy: round-robin, url: http://www.gstatic.com/generate_204}
ProxyGroupLB_CH: &pg_lb_ch {<<: *base_PG, type: load-balance, strategy: consistent-hashing, url: http://www.gstatic.com/generate_204}

# # 过滤器
BaseFilter: &base_filter '^(?!.*(DIRECT|直接连接|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))'
# ## 倍率过滤
FilterHR: &filter_HR '^(?=.*\b([2-9]|[1-9][0-9]+)(\.[0-9]+)?[×x]\b).*$'
FilterNR: &filter_NR '^[^×x]*$'
FilterLR: &filter_LR '^(?=.*(0\.1[×x]|0\.01[×x]|0\.1\b|0\.0[0-9])).*$'
# ## 地区过滤
FilterHK: &filter_HK '(?i)🇭🇰|香港|(\b(HK|HongKong|Hong Kong)\b)'
FilterTW: &filter_TW '(?i)🇨🇳|🇹🇼|台湾|(\b(TW|Taiwan)\b)'
FilterJP: &filter_JP '(?i)🇯🇵|日本|(\b(JP|Japan)\b)'
FilterKR: &filter_KR '(?i)🇰🇷|韩国|(\b(KR|South Korea)\b)'
FilterUS: &filter_US '(?i)🇺🇸|美国|(\b(US|USA|United States)\b)'
FilterSG: &filter_SG '(?i)🇸🇬|新加坡|狮城|(\b(SG|Singapore)\b)'
FilterOT: &filter_OT '^(?!.*(?i)(🇭🇰|香港|(\b(HK|HongKong|Hong Kong)\b)|🇨🇳|🇹🇼|台湾|(\b(TW|Taiwan)\b)|🇯🇵|日本|(\b(JP|Japan)\b)|🇰🇷|韩国|(\b(KR|South Korea)\b)|🇺🇸|美国|(\b(US|USA|United States)\b)|🇸🇬|新加坡|狮城|(\b(SG|Singapore)\b))).*$'

ExcludeHK: &exclude_HK '^(?!.*(?i)(🇭🇰|香港|\b(HK|HongKong|Hong Kong)\b)).*$'
ExcludeTW: &exclude_TW '^(?!.*(?i)(🇨🇳|🇹🇼|台湾|\b(TW|Taiwan)\b)).*$'
ExcludeJP: &exclude_JP '^(?!.*(?i)(🇯🇵|日本|\b(JP|Japan)\b)).*$'
ExcludeKR: &exclude_KR '^(?!.*(?i)(🇰🇷|韩国|\b(KR|South Korea)\b)).*$'
ExcludeUS: &exclude_US '^(?!.*(?i)(🇺🇸|美国|\b(US|USA|United States)\b)).*$'
ExcludeSG: &exclude_SG '^(?!.*(?i)(🇸🇬|新加坡|狮城|\b(SG|Singapore)\b)).*$'
ExcludeOT: &exclude_OT '(?i)(🇭🇰|香港|(\b(HK|HongKong|Hong Kong)\b)|🇨🇳|🇹🇼|台湾|(\b(TW|Taiwan)\b)|🇯🇵|日本|(\b(JP|Japan)\b)|🇰🇷|韩国|(\b(KR|South Korea)\b)|🇺🇸|美国|(\b(US|USA|United States)\b)|🇸🇬|新加坡|狮城|(\b(SG|Singapore)\b))'

# ## 倍率+地区过滤
FilterHK_NR: &filter_HK_NR '^(?!.*[×])(?i).*?(🇭🇰|香港|\b(HK|HongKong|Hong Kong)\b).*$'
FilterTW_NR: &filter_TW_NR '^(?!.*[×])(?i).*?(🇨🇳|🇹🇼|台湾|\b(TW|Taiwan)\b).*$'
FilterJP_NR: &filter_JP_NR '^(?!.*[×])(?i).*?(🇯🇵|日本|\b(JP|Japan)\b).*$'
FilterKR_NR: &filter_KR_NR '^(?!.*[×])(?i).*?(🇰🇷|韩国|\b(KR|South Korea)\b).*$'
FilterUS_NR: &filter_US_NR '^(?!.*[×])(?i).*?(🇺🇸|美国|\b(US|USA|United States)\b).*$'
FilterSG_NR: &filter_SG_NR '^(?!.*[×])(?i).*?(🇸🇬|新加坡|狮城|\b(SG|Singapore)\b).*$'
FilterOT_NR: &filter_OT_NR '^(?!.*[×])(?!.*(?i)(🇭🇰|香港|\b(HK|HongKong|Hong Kong)\b|🇨🇳|🇹🇼|台湾|\b(TW|Taiwan)\b|🇯🇵|日本|\b(JP|Japan)\b|🇰🇷|韩国|\b(KR|South Korea)\b|🇺🇸|美国|\b(US|USA|United States)\b|🇸🇬|新加坡|狮城|\b(SG|Singapore)\b)).*$'
# ## 特殊过滤
FilterForEmbyNR: &filter_EmbyNR '^(?!.*(?i)([×]|🇯🇵|日本|(\b(JP|Japan)\b))).*$'
FilterForEmbyLR: &filter_EmbyLR '^(?=.*(0\.1[×]|0\.01[×]|0\.1\b|0\.0[0-9]))(?!.*(🇯🇵|日本|\b(JP|Japan)\b)).*$'
FilterForEmbySpecify: &filter_EmbySpecify '^(?!.*(?i)([×]|🇭🇰|香港|🇯🇵|日本|🇺🇸|美国|(\b(JP|Japan|HK|HongKong|Hong Kong|US|USA)\b))).*$'

# # 全局策略组
GlobalPG_GLOBAL: &gpg_global {type: select, proxies: [🚀 自动选择, ♻️ 智能选择, 👋 手动选择, 🦄 故障转移, 🪂 临时选择, 🎯 直接连接]}
GlobalPG_AUTO: &gpg_auto {<<: *pg_ut, proxies: [🇭🇰 香港节点, 🇨🇳 台湾节点, 🇯🇵 日本节点, 🇰🇷 韩国节点, 🇺🇸 美国节点, 🇸🇬 狮城节点]}
GlobalPG_SMART: &gpg_smart {<<: *pg_sm, proxies: [🇭🇰 香港智能, 🇨🇳 台湾智能, 🇯🇵 日本智能, 🇰🇷 韩国智能, 🇺🇸 美国智能, 🇸🇬 狮城智能]}
GlobalPG_MANUAL: &gpg_manual {type: select, proxies: [🛫 常规订阅, 🦄 故障转移, 🪂 临时选择]}

# ## 自定义smart
SmartHK: &s_hk {<<: *pg_sm_h, policy-priority: '🇭🇰:6;🇨🇳:5;🇯🇵:4;🇰🇷:3;🇺🇸:2;🇸🇬:1'}
SmartTW: &s_tw {<<: *pg_sm_h, policy-priority: '🇭🇰:5;🇨🇳:6;🇯🇵:4;🇰🇷:3;🇺🇸:2;🇸🇬:1'}
SmartJP: &s_jp {<<: *pg_sm_h, policy-priority: '🇭🇰:4;🇨🇳:5;🇯🇵:6;🇰🇷:3;🇺🇸:2;🇸🇬:1'}
SmartKR: &s_kr {<<: *pg_sm_h, policy-priority: '🇭🇰:3;🇨🇳:4;🇯🇵:5;🇰🇷:6;🇺🇸:2;🇸🇬:1'}
SmartUS: &s_us {<<: *pg_sm_h, policy-priority: '🇭🇰:2;🇨🇳:3;🇯🇵:4;🇰🇷:5;🇺🇸:6;🇸🇬:1'}
SmartSG: &s_sg {<<: *pg_sm_h, policy-priority: '🇭🇰:1;🇨🇳:2;🇯🇵:3;🇰🇷:4;🇺🇸:5;🇸🇬:6'}

# ## 自定义默认初始选择
