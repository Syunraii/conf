# ========================= 核心配置 =========================
mode: rule
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
allow-lan: false
unified-delay: true
tcp-concurrent: true
log-level: warning
bind-address: '*'
find-process-mode: 'always'
keep-alive-idle: 600
keep-alive-interval: 15

authentication:
  - mihomo:6666666
skip-auth-prefixes:
  - 127.0.0.1/8
  - ::1/128

experimental:
  quic-go-disable-gso: true  

external-ui: ui
external-ui-name: zashboard
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-controller: 127.0.0.1:9090
secret: 6666666

geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"
  asn: "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb"

profile:
  store-selected: true 
  store-fake-ip: true


sniffer:
  enable: true
  parse-pure-ip: true
  force-dns-mapping: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - '+.push.apple.com'
    # 向日葵远程
    - '*.oray.com'
    - '*.sunlogin.net'

tun:
  enable: false
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  ipv6: false
  prefer-h3: false
  cache-algorithm: arc
  respect-rules: false
  use-hosts: true
  use-system-hosts: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - rule-set:CYaml-Lan
    - rule-set:CText-Lan
    - rule-set:CYaml-Direct
    - rule-set:CText-Direct
    - rule-set:DMrs-Direct
    - rule-set:DMrs-Private
    - geosite:private
    - '*.lan'
    - '*.local'
    - '*.direct'
    - '*.msftconnecttest.com'
    - '*.msftncsi.com'
    - xbox.*.microsoft.com
    - '*.xboxlive.com'
    - '*.push.apple.com'
    - '*.srv.nintendo.net'
    - '*.stun.playstation.net'
    - '*.battlenet.com.cn'
    - '*.battlenet.com'
    - '*.blzstatic.cn'
    - '*.battle.net'
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
    - 114.114.114.114
    - 180.76.76.76
  nameserver:
    - system
    - quic://223.5.5.5
    - tls://dot.pub:853
    - tls://dns.alidns.com
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - tls://1.1.1.1:853
    - tls://dns.google
    - https://dns.google/dns-query

