# 将订阅填入[订阅地址]


http_port: 6152
socks_port: 6153
vif_only: true
hijack_dns:
- '*:53'
geoip_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb
asn_db_url: https://raw.githubusercontent.com/Loyalsoldier/geoip/release/GeoLite2-ASN.mmdb
dns:
  bootstrap:
  - system
  upstreams:
    DNS-Domestic:
    - 223.5.5.5
    - 119.29.29.29
    DNS-Domestic-Encrypted:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    DNS-Foreign-Encrypted:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  hosts:
    dns.google:
    - 8.8.8.8, 8.8.4.4, 2001:4860:4860::8888, 2001:4860:4860::8844
    cloudflare-dns.com:
    - 104.16.249.249, 104.16.248.249, 2606:4700::6810:f8f9, 2606:4700::6810:f9f9
    dns.alidns.com:
    - 223.5.5.5, 223.6.6.6, 2400:3200:baba::1, 2400:3200::1
    doh.pub:
    - 1.12.12.12, 120.53.53.53
    dot.pub:
    - 1.12.12.12, 120.53.53.53
  proxy_nameservers:
  - 119.29.29.29
  - 223.5.5.5
real_ip_domains:
- stun.l.google.com
- lancache.steamcontent.com
- '*.msftconnecttest.com'
- '*.msftncsi.com'
- '*.srv.nintendo.net'
- '*.stun.playstation.net'
- xbox.*.microsoft.com
- '*.xboxlive.com'
- '*.logon.battlenet.com.cn'
- '*.logon.battle.net'
- '*.blzstatic.cn'
- '*.battle.net'
- '*.cmpassport.com'
- id6.me
- open.e.189.cn
- mdn.open.wo.cn
- opencloud.wostore.cn
- auth.wosms.cn
- '*.10099.com.cn'
